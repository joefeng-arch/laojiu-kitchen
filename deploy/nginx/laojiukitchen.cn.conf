# /etc/nginx/conf.d/laojiukitchen.cn.conf
# 老舅厨房生产 Nginx 配置
#
# 三个站点：
#   laojiukitchen.cn       → 落地页（静态）
#   api.laojiukitchen.cn   → 后端 API（反向代理 127.0.0.1:3001）
#   admin.laojiukitchen.cn → 管理后台前端（前端 dist 静态）
#
# 注意：nginx.conf 只 include conf.d/*.conf，不 include sites-enabled/
# 所以此文件应放在 /etc/nginx/conf.d/ 而非 sites-available/sites-enabled
#
# HTTPS 证书由 certbot 申请，路径 /etc/letsencrypt/live/laojiukitchen.cn/
# 仅签发主域 + api + admin，不含 www（DNS 未配置 www）

# ─── 全局 HTTP → HTTPS 跳转 ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name laojiukitchen.cn api.laojiukitchen.cn admin.laojiukitchen.cn;

    # certbot http-01 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── 主站：落地页 ────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name laojiukitchen.cn;

    ssl_certificate     /etc/letsencrypt/live/laojiukitchen.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laojiukitchen.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/laojiukitchen-landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── API ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.laojiukitchen.cn;

    ssl_certificate     /etc/letsencrypt/live/laojiukitchen.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laojiukitchen.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}

# ─── Admin 前端 ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.laojiukitchen.cn;

    ssl_certificate     /etc/letsencrypt/live/laojiukitchen.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laojiukitchen.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/laojiukitchen-admin;
    index index.html;

    client_max_body_size 10m;

    # 上传的图片由后端静态服务，前端/管理后台用相对路径 /uploads/ 访问
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
