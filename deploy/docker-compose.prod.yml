services:
  postgres:
    image: postgres:16-alpine
    container_name: ujk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /var/lib/laojiu-kitchen/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ujknet

  redis:
    image: redis:7-alpine
    container_name: ujk-redis
    restart: unless-stopped
    volumes:
      - /var/lib/laojiu-kitchen/redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ujknet

  api:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.prod
    container_name: ujk-api
    restart: unless-stopped
    env_file:
      - ../server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:3001:3001'
    volumes:
      - /var/lib/laojiu-kitchen/uploads:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ujknet

networks:
  ujknet:
    driver: bridge
